# --- DATABASE CONFIGURATION ---
# Default to H2 for local development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:pentachatdb;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# --- MAIL CONFIGURATION ---
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:DIEN_EMAIL_CUA_BAN_VAO_DAY}
spring.mail.password=${SPRING_MAIL_PASSWORD:DIEN_APP_PASSWORD_16_KY_TU_VAO_DAY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true