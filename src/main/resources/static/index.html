<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PentaChat - Đăng Nhập</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <h1>💬 PentaChat</h1>
                <p>Real-time WebSocket Chat</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Nhập username của bạn"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Nhập password của bạn"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span class="btn-text">Đăng Nhập</span>
                    <span class="btn-loader" style="display: none;">⏳</span>
                </button>

                <div style="text-align: right; margin-top: 15px; margin-bottom: 10px;">
                    <a href="#" id="btnForgotPassword" style="color: #bbb; font-size: 0.9em; text-decoration: none;">
                        Quên mật khẩu?
                    </a>
                </div>
            </form>

            <div class="divider">
                <span>hoặc</span>
            </div>

            <button class="btn btn-secondary" id="registerBtn">
                Đăng Ký Tài Khoản Mới
            </button>

            <div class="info-box">
                <p><strong>💡 Hướng dẫn:</strong></p>
                <ul>
                    <li>Đăng nhập với tài khoản có sẵn</li>
                    <li>Hoặc đăng ký tài khoản mới</li>
                    <li>Sau đó bắt đầu chat realtime!</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>

    <script>
        document.getElementById('btnForgotPassword').addEventListener('click', async function(e) {
            e.preventDefault();
            
            // 1. Hiện hộp thoại hỏi Username
            const username = prompt("Nhập Username của bạn để lấy lại mật khẩu:");
            
            if (username) {
                // 2. Gọi API gửi mail
                try {
                    // Thông báo nhẹ để người dùng biết đang xử lý
                    // (Tùy chọn: Có thể dùng alert hoặc console.log)
                    console.log("Đang gửi yêu cầu..."); 
                    
                    const response = await fetch('/api/auth/forgot-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username: username })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        alert("✅ Thành công! " + data.message);
                    } else {
                        alert("❌ Lỗi: " + (data.message || "Có lỗi xảy ra"));
                    }
                } catch (error) {
                    console.error(error);
                    alert("❌ Không thể kết nối đến Server!");
                }
            }
        });
    </script>
</body>
</html>
