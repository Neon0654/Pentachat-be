<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PentaChat - Game Center</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS riêng cho trang Game */
        body { 
            background-color: #0f0f1a; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: radial-gradient(circle at 10% 20%, rgb(0, 0, 0) 0%, rgb(24, 24, 46) 90.2%); 
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header đẹp hơn */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 40px; border-bottom: 2px solid #2d2d44; padding-bottom: 20px; 
        }
        .header h1 { font-size: 2.5em; background: -webkit-linear-gradient(#eee, #333); -webkit-text-fill-color: transparent; -webkit-background-clip: text; color: white; text-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .btn-back { 
            background: rgba(255, 255, 255, 0.1); color: white; text-decoration: none; 
            padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }
        .btn-back:hover { background: rgba(255, 255, 255, 0.2); transform: translateX(-5px); }
        
        /* Lưới hiển thị game */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        
        /* Thẻ Game (Card) - Hiệu ứng Glassmorphism */
        .game-card { 
            background: rgba(30, 30, 50, 0.6); 
            border-radius: 20px; 
            overflow: hidden; 
            transition: transform 0.3s, box-shadow 0.3s; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            position: relative;
        }
        .game-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
            border-color: #e94560;
        }
        
        .game-img-container {
            width: 100%; height: 180px; overflow: hidden; position: relative;
        }
        .game-img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.5s; 
        }
        .game-card:hover .game-img { transform: scale(1.1); }
        
        .game-info { padding: 20px; }
        .game-title { font-size: 1.4em; font-weight: bold; margin-bottom: 10px; color: #fff; }
        .game-desc { font-size: 0.9em; color: #a0a0b0; margin-bottom: 20px; height: 45px; overflow: hidden; line-height: 1.4; }
        
        .btn-play { 
            width: 100%; padding: 12px; 
            background: linear-gradient(90deg, #ff416c, #ff4b2b); 
            border: none; color: white; border-radius: 10px; 
            cursor: pointer; font-weight: bold; font-size: 1em;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.3);
            transition: all 0.3s;
        }
        .btn-play:hover { box-shadow: 0 5px 20px rgba(255, 75, 43, 0.6); transform: scale(1.02); }

        /* Khu vực chơi game (Ẩn mặc định) */
        #gameArea { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #gameFrame { width: 85%; height: 85%; background: #16213e; border-radius: 15px; box-shadow: 0 0 50px rgba(255,255,255,0.1); }
        .close-game { color: white; margin-bottom: 15px; cursor: pointer; font-size: 18px; background: #e94560; padding: 8px 25px; border-radius: 30px; border: none; font-weight: bold; }
        .close-game:hover { background: #ff2e4d; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🎮 Game Center</h1>
            <a href="chat.html" class="btn-back">⬅ Quay lại Chat</a>
        </div>

        <div class="game-grid" id="gameList">
            <p style="text-align: center; font-size: 1.2em; color: #888;">🚀 Đang tải dữ liệu từ vũ trụ...</p>
        </div>
    </div>

    <div id="gameArea">
        <button class="close-game" onclick="closeGame()">Đóng Game ❌</button>
        <iframe id="gameFrame" src="" frameborder="0"></iframe>
    </div>

    <script>
        // --- ĐÃ SỬA: HÀM CHỌN ẢNH TỪ MÁY TÍNH ---
        function getGameImage(gameName) {
            // Kiểm tra tên game để trỏ vào đúng ảnh trong thư mục img
            if (gameName.includes("Caro") || gameName.includes("X/O")) {
                return "img/caro.jpg"; 
            } 
            else if (gameName.includes("Rắn") || gameName.includes("Snake") || gameName.includes("R?n")) {
                return "img/snake.jpg";
            } 
            else if (gameName.includes("Đào") || gameName.includes("Gold")) {
                return "img/gold.jpg";
            }
            // Ảnh mặc định nếu không khớp
            return "https://via.placeholder.com/300x180?text=Game+Image"; 
        }

        // 1. GỌI API ĐỂ LẤY DANH SÁCH GAME
        fetch('/api/games')
            .then(response => response.json())
            .then(data => {
                const gameListDiv = document.getElementById('gameList');
                gameListDiv.innerHTML = ''; 

                if (data.success && data.data) {
                    data.data.forEach(game => {
                        // Lấy đường dẫn ảnh từ máy
                        const fancyImage = getGameImage(game.name);

                        const gameHtml = `
                            <div class="game-card">
                                <div class="game-img-container">
                                    <img src="${fancyImage}" class="game-img" alt="${game.name}" onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'">
                                </div>
                                <div class="game-info">
                                    <div class="game-title">${game.name}</div>
                                    <div class="game-desc">${game.description}</div>
                                    <button class="btn-play" onclick="playGame('${game.name}')">🚀 CHƠI NGAY</button>
                                </div>
                            </div>
                        `;
                        gameListDiv.innerHTML += gameHtml;
                    });
                }
            })
            .catch(err => {
                console.error('Lỗi:', err);
                document.getElementById('gameList').innerHTML = '<p style="text-align:center">⚠️ Không tải được danh sách game :(</p>';
            });

        // 3. HÀM XỬ LÝ CHƠI GAME
        function playGame(gameName) {
            let gameUrl = "";

            if (gameName.includes("Rắn") || gameName.includes("Snake") || gameName.includes("R?n")) {
                gameUrl = "/games/snake/index.html"; 
            } 
            else if (gameName.includes("Caro") || gameName.includes("X/O")) {
                // ĐÃ SỬA: Trỏ vào game Caro mới làm
                gameUrl = "/games/caro/index.html"; 
            }
            else if (gameName.includes("Đào") || gameName.includes("Gold")) {
                 // ĐÃ SỬA: Trỏ vào game Đào vàng mới làm
                gameUrl = "/games/goldminer/index.html";
            }
            else {
                alert("🚧 Game " + gameName + " đang được phát triển!");
                return;
            }

            document.getElementById('gameArea').style.display = 'flex';
            document.getElementById('gameFrame').src = gameUrl;
            
            // Focus để nhận phím bấm ngay
            setTimeout(() => { document.getElementById('gameFrame').focus(); }, 100);
        }

        function closeGame() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('gameFrame').src = '';
        }
    </script>
</body>
</html>
