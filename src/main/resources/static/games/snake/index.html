<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
            flex-direction: column;
        }
        canvas {
            border: 2px solid #e94560;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            background: #16213e;
        }
        h2 { margin-bottom: 10px; }
        .score { font-size: 20px; color: #0f3460; background: #e94560; padding: 5px 15px; border-radius: 10px; margin-bottom: 10px;}
    </style>
</head>
<body>
    <h2>🐍 RẮN SĂN MỒI</h2>
    <div class="score">Điểm: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <p>Dùng phím mũi tên ⬅️⬆️⬇️➡️ để chơi</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        let speed = 7;
        let tileCount = 20;
        let tileSize = canvas.width / tileCount - 2;
        
        let headX = 10;
        let headY = 10;
        let xVelocity = 0;
        let yVelocity = 0;

        let appleX = 5;
        let appleY = 5;

        let snakeParts = [];
        let tailLength = 2;
        let score = 0;

        function drawGame() {
            changeSnakePosition();
            let result = isGameOver();
            if(result){
                document.body.innerHTML = "<h1 style='color:red'>GAME OVER! 💀</h1><h2 style='color:white'>Điểm: " + score + "</h2><button onclick='location.reload()' style='padding:10px 20px; cursor:pointer'>Chơi lại</button>";
                return;
            }

            clearScreen();
            checkAppleCollision();
            drawApple();
            drawSnake();
            drawScore();
            setTimeout(drawGame, 1000/ speed);
        }

        function isGameOver(){
            let gameOver = false;
            if(yVelocity === 0 && xVelocity === 0) return false;
            
            // Đâm tường
            if(headX < 0 || headX === tileCount || headY < 0 || headY === tileCount) gameOver = true;

            // Cắn đuôi
            for(let i =0; i < snakeParts.length; i++){
                let part = snakeParts[i];
                if(part.x === headX && part.y === headY) gameOver = true;
            }
            return gameOver;
        }

        function drawScore(){
            scoreElement.innerText = score;
        }

        function clearScreen(){
            ctx.fillStyle = '#16213e';
            ctx.fillRect(0,0,canvas.width, canvas.height);
        }

        function drawSnake(){
            ctx.fillStyle = '#e94560';
            for(let i =0; i < snakeParts.length; i++){
                let part = snakeParts[i];
                ctx.fillRect(part.x * tileCount, part.y * tileCount, tileSize, tileSize);
            }

            snakeParts.push(new SnakePart(headX, headY));
            if(snakeParts.length > tailLength){
                snakeParts.shift(); 
            }

            ctx.fillStyle = '#ff6b6b'; // Đầu rắn
            ctx.fillRect(headX * tileCount, headY * tileCount, tileSize, tileSize);
        }

        function changeSnakePosition(){
            headX = headX + xVelocity;
            headY = headY + yVelocity;
        }

        function drawApple(){
            ctx.fillStyle = "#00ff00";
            ctx.fillRect(appleX * tileCount, appleY * tileCount, tileSize, tileSize);
        }

        function checkAppleCollision(){
            if(appleX === headX && appleY == headY){
                appleX = Math.floor(Math.random() * tileCount);
                appleY = Math.floor(Math.random() * tileCount);
                tailLength++;
                score++;
                speed += 0.2; // Tăng tốc độ
            }
        }

        document.body.addEventListener('keydown', keyDown);

        function keyDown(event){
            // Lên
            if(event.keyCode == 38){
                if(yVelocity == 1) return;
                yVelocity = -1;
                xVelocity = 0;
            }
            // Xuống
            if(event.keyCode == 40){
                if(yVelocity == -1) return;
                yVelocity = 1;
                xVelocity = 0;
            }
            // Trái
            if(event.keyCode == 37){
                if(xVelocity == 1) return;
                yVelocity = 0;
                xVelocity = -1;
            }
            // Phải
            if(event.keyCode == 39){
                if(xVelocity == -1) return;
                yVelocity = 0;
                xVelocity = 1;
            }
        }

        function SnakePart(x, y){
            this.x = x;
            this.y = y;
        }

        drawGame();
    </script>
</body>
</html>
