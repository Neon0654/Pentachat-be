<!DOCTYPE html>
<html>
<head>
    <title>Cờ Caro</title>
    <style>
        body { background: #0f0f1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h2 { margin: 10px 0; color: #e94560; }
        #board { display: grid; grid-template-columns: repeat(15, 30px); grid-template-rows: repeat(15, 30px); gap: 1px; background: #333; border: 5px solid #e94560; }
        .cell { width: 30px; height: 30px; background: #1a1a2e; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; cursor: pointer; }
        .cell:hover { background: #16213e; }
        .x { color: #ff416c; } /* Màu X */
        .o { color: #00ff00; } /* Màu O */
        .btn-rs { margin-top: 15px; padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>⭕ CỜ CARO (5 Tích) ❌</h2>
    <div id="status" style="margin-bottom: 10px;">Lượt của bạn (X)</div>
    <div id="board"></div>
    <button class="btn-rs" onclick="resetGame()">Chơi Lại</button>

    <script>
        const BOARD_SIZE = 15;
        let board = [];
        let isGameOver = false;
        // Người chơi là X, Máy là O
        
        function initGame() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board = [];
            isGameOver = false;
            document.getElementById('status').innerText = "Lượt của bạn (X)";

            for (let i = 0; i < BOARD_SIZE; i++) {
                let row = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => playerMove(i, j);
                    boardEl.appendChild(cell);
                    row.push({ val: '', el: cell });
                }
                board.push(row);
            }
        }

        function playerMove(r, c) {
            if (isGameOver || board[r][c].val !== '') return;
            
            // Người chơi đánh
            makeMove(r, c, 'X');
            if (checkWin(r, c, 'X')) return endGame("Bạn Thắng! 🎉");

            // Máy đánh (AI ngẫu nhiên đơn giản + chặn)
            document.getElementById('status').innerText = "Máy đang nghĩ...";
            setTimeout(() => {
                if (!isGameOver) botMove();
            }, 500);
        }

        function botMove() {
            // Logic máy đơn giản: Tìm ô trống ngẫu nhiên (Bạn có thể nâng cấp AI sau)
            let emptyCells = [];
            for(let i=0; i<BOARD_SIZE; i++)
                for(let j=0; j<BOARD_SIZE; j++)
                    if(board[i][j].val === '') emptyCells.push({r:i, c:j});

            if(emptyCells.length > 0) {
                let move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                makeMove(move.r, move.c, 'O');
                if (checkWin(move.r, move.c, 'O')) endGame("Máy Thắng! 🤖");
                else document.getElementById('status').innerText = "Lượt của bạn (X)";
            }
        }

        function makeMove(r, c, symbol) {
            board[r][c].val = symbol;
            board[r][c].el.innerHTML = `<span class="${symbol.toLowerCase()}">${symbol}</span>`;
        }

        function checkWin(r, c, symbol) {
            // Kiểm tra 4 hướng: Ngang, Dọc, Chéo chính, Chéo phụ
            const directions = [[0,1], [1,0], [1,1], [1,-1]];
            for (let d of directions) {
                let count = 1;
                // Duyệt xuôi
                for (let k = 1; k < 5; k++) {
                    let nr = r + d[0]*k, nc = c + d[1]*k;
                    if (valid(nr, nc) && board[nr][nc].val === symbol) count++; else break;
                }
                // Duyệt ngược
                for (let k = 1; k < 5; k++) {
                    let nr = r - d[0]*k, nc = c - d[1]*k;
                    if (valid(nr, nc) && board[nr][nc].val === symbol) count++; else break;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        function valid(r, c) { return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE; }
        function endGame(msg) { isGameOver = true; document.getElementById('status').innerText = msg; alert(msg); }
        function resetGame() { initGame(); }

        initGame();
    </script>
</body>
</html>
