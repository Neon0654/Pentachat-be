<!DOCTYPE html>
<html>
<head>
    <title>Đào Vàng</title>
    <style>
        body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: Arial; overflow: hidden; }
        canvas { background: url('https://i.imgur.com/8Xw9tX3.jpeg') no-repeat center center; background-size: cover; border: 4px solid #ffd700; border-radius: 10px; box-shadow: 0 0 20px #ffd700; }
        #ui { position: absolute; top: 20px; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 0 #000; }
    </style>
</head>
<body>
    <div id="ui">Điểm: <span id="score">0</span> | Mục tiêu: 500</div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Biến game
        let score = 0;
        let hook = { x: 400, y: 50, angle: 0, length: 50, status: "swing", dAngle: 1, speed: 5 };
        let golds = [];
        
        // Tạo vàng ngẫu nhiên (Vàng to, Vàng nhỏ, Đá)
        function initGolds() {
            golds = [];
            for(let i=0; i<5; i++) golds.push({x: Math.random()*700+50, y: Math.random()*300+150, r: 30, type: 'gold', val: 100, weight: 3, color: '#FFD700'}); // Vàng to
            for(let i=0; i<5; i++) golds.push({x: Math.random()*700+50, y: Math.random()*300+150, r: 15, type: 'gold', val: 50, weight: 6, color: '#FFFFE0'});  // Vàng nhỏ
            for(let i=0; i<3; i++) golds.push({x: Math.random()*700+50, y: Math.random()*300+150, r: 25, type: 'rock', val: 10, weight: 1, color: '#555'});     // Đá (Nặng, ít điểm)
        }

        // Vòng lặp game
        function update() {
            // 1. Xử lý cái móc
            if (hook.status === "swing") {
                hook.angle += hook.dAngle;
                if (hook.angle > 70 || hook.angle < -70) hook.dAngle *= -1;
            } else if (hook.status === "shoot") {
                hook.length += hook.speed;
                // Chạm biên thì thu về
                if (hook.length > 500 || hook.x + Math.sin(toRad(hook.angle))*hook.length < 0 || hook.x + Math.sin(toRad(hook.angle))*hook.length > 800) {
                    hook.status = "rewind";
                }
            } else if (hook.status === "rewind") {
                hook.length -= hook.speed;
                if (hook.length <= 50) {
                    hook.length = 50;
                    hook.status = "swing";
                    hook.speed = 5; // Reset tốc độ
                    if (hook.caughtItem) {
                        score += hook.caughtItem.val;
                        // Xóa vàng đã gắp
                        golds = golds.filter(g => g !== hook.caughtItem);
                        hook.caughtItem = null;
                        document.getElementById("score").innerText = score;
                        if(golds.length === 0) alert("Thắng rồi! Bạn đã đào hết mỏ vàng! 🏆");
                    }
                }
            }

            // 2. Va chạm
            let hx = hook.x + Math.sin(toRad(hook.angle)) * hook.length;
            let hy = hook.y + Math.cos(toRad(hook.angle)) * hook.length;

            if (hook.status === "shoot") {
                for (let g of golds) {
                    let dx = hx - g.x;
                    let dy = hy - g.y;
                    if (Math.sqrt(dx*dx + dy*dy) < g.r) {
                        hook.status = "rewind";
                        hook.caughtItem = g;
                        hook.speed = g.weight; // Kéo nặng thì chậm
                        break;
                    }
                }
            }
        }

        function draw() {
            // Xóa màn hình (Vẽ nền tối đơn giản nếu ảnh lỗi)
            ctx.fillStyle = "#444"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vẽ Vàng/Đá
            for (let g of golds) {
                if (g === hook.caughtItem) continue; // Đang gắp thì không vẽ ở vị trí cũ
                ctx.beginPath();
                ctx.arc(g.x, g.y, g.r, 0, Math.PI*2);
                ctx.fillStyle = g.color;
                ctx.fill();
                ctx.stroke();
            }

            // Vẽ dây móc
            let hx = hook.x + Math.sin(toRad(hook.angle)) * hook.length;
            let hy = hook.y + Math.cos(toRad(hook.angle)) * hook.length;
            
            ctx.beginPath();
            ctx.moveTo(hook.x, hook.y);
            ctx.lineTo(hx, hy);
            ctx.lineWidth = 3;
            ctx.strokeStyle = "white";
            ctx.stroke();

            // Vẽ đầu móc
            ctx.beginPath();
            ctx.arc(hx, hy, 5, 0, Math.PI*2);
            ctx.fillStyle = "red";
            ctx.fill();

            // Vẽ vật đang gắp (nếu có)
            if (hook.caughtItem) {
                let item = hook.caughtItem;
                ctx.beginPath();
                ctx.arc(hx, hy + item.r, item.r, 0, Math.PI*2);
                ctx.fillStyle = item.color;
                ctx.fill();
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function toRad(deg) { return deg * Math.PI / 180; }

        // Bấm chuột hoặc phím Cách để thả ngàm
        window.addEventListener("keydown", (e) => { if (e.code === "Space" && hook.status === "swing") hook.status = "shoot"; });
        window.addEventListener("mousedown", () => { if (hook.status === "swing") hook.status = "shoot"; });

        initGolds();
        loop();
    </script>
</body>
</html>
