services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pentachat-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong@Passw0rd", "-h", "-1", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pentachat-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://db;databaseName=master;encrypt=true;trustServerCertificate=true
      - SPRING_DATASOURCE_DRIVER=com.microsoft.sqlserver.jdbc.SQLServerDriver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
      - SPRING_JPA_DIALECT=org.hibernate.dialect.SQLServer2012Dialect
      - SPRING_MAIL_USERNAME=${MAIL_USERNAME:-your_email@gmail.com}
      - SPRING_MAIL_PASSWORD=${MAIL_PASSWORD:-your_app_password}
    restart: always

networks:
  default:
    name: pentachat-network
